<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OZAWA KNIGHT</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{background:#000;overflow:hidden;height:100dvh;font-family:monospace;touch-action:none}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;-ms-interpolation-mode:nearest-neighbor}
#gameCanvas{position:absolute;top:0;left:0;width:100%;height:100dvh;touch-action:none}

.screen{position:absolute;top:0;left:0;width:100%;height:100dvh;display:none;flex-direction:column}
#chat-screen{z-index:100;background:#1a1a2e;touch-action:manipulation}
#chat-screen.show{display:flex}

.chat-header{width:100%;padding:8px 12px;padding-top:max(8px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:2;position:relative;background:rgba(20,20,50,0.95);border-bottom:3px solid #4a4a8a}
.chat-back{font-size:20px;cursor:pointer;padding:4px 8px;color:#7a7aff;font-weight:bold;line-height:1}
.chat-back:active{opacity:0.5}
.chat-avatar{width:36px;height:36px;border:2px solid #5a5aff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;background:#2a2a5a}
.chat-header-info{flex:1}
.chat-header-partner{font-size:14px;font-weight:600;color:#c0c0ff;cursor:pointer;font-family:monospace}
.chat-header-me{font-size:10px;color:#7a7aaa;cursor:pointer;font-family:monospace;margin-top:2px}
.chat-swap{font-size:16px;cursor:pointer;padding:4px 8px;color:#5a5a9a}
.chat-swap:active{opacity:0.5}

.chat-messages{flex:1;width:100%;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;position:relative;z-index:1;background:linear-gradient(180deg,#12122a 0%,#1a1a35 50%,#12122a 100%)}
.chat-messages::-webkit-scrollbar{display:none}

.msg-row{display:flex;align-items:flex-end;gap:6px}
.msg-row.mine{flex-direction:row-reverse}
.msg-avatar-sm{width:24px;height:24px;border:2px solid #5a5aff;flex-shrink:0;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;background:#2a2a5a}
.msg-wrap{display:flex;flex-direction:column;max-width:72%}
.msg-row.mine .msg-wrap{align-items:flex-end}
.msg-bubble{padding:10px 14px;font-size:14px;line-height:1.45;word-break:break-word;max-width:100%;animation:msgIn .22s ease;border:2px solid;font-family:-apple-system,'Helvetica Neue',sans-serif}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.mine .msg-bubble{background:#2a2a6a;color:#d0d0ff;border-color:#5a5aff}
.msg-row.theirs .msg-bubble{background:#1a3a2a;color:#c0ffc0;border-color:#4a8a4a}
.msg-bubble.held{opacity:0.5;transform:scale(0.95)}

.chat-input-area{width:100%;padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:rgba(20,20,50,0.95);border-top:3px solid #4a4a8a;position:relative;z-index:2}
.chat-input{flex:1;border:2px solid #4a4a8a;padding:8px 12px;font-size:15px;outline:none;resize:none;max-height:100px;font-family:-apple-system,'Helvetica Neue',sans-serif;line-height:1.4;-webkit-user-select:text;user-select:text;background:#0a0a20;color:#c0c0ff}
.chat-input::placeholder{color:#4a4a7a}
.send-btn{width:40px;height:40px;border:2px solid #5a5aff;background:#2a2a6a;color:#c0c0ff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:bold}
.send-btn:active{background:#4a4aaa}
.loading-msg{text-align:center;font-size:12px;padding:20px;color:#5a5a8a;font-family:monospace}

#delete-confirm{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7)}
#delete-confirm.show{display:flex}
.delete-box{background:#1a1a2e;border:3px solid #ff4444;padding:20px;width:80%;max-width:300px;text-align:center}
.delete-box p{color:#ff8888;font-family:monospace;font-size:14px;margin-bottom:16px}
.delete-btn{width:100%;padding:12px;border:2px solid #ff4444;background:rgba(255,68,68,0.2);color:#ff4444;font-size:15px;font-family:monospace;font-weight:bold;cursor:pointer;margin-bottom:8px}
.delete-btn:active{background:rgba(255,68,68,0.4)}
.delete-cancel{width:100%;padding:12px;border:2px solid #5a5a8a;background:rgba(90,90,138,0.2);color:#8a8aaa;font-size:15px;font-family:monospace;cursor:pointer}
.delete-cancel:active{background:rgba(90,90,138,0.4)}
</style>
</head>

<canvas id="gameCanvas"></canvas>

<div id="chat-screen" class="screen">

    </div>
    <div class="chat-swap" onclick="swapIdentity()">⇄</div>
  </div>
  <div class="chat-messages" id="chat-messages"><div class="loading-msg">読み込み中...</div></div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chat-input" placeholder="メッセージ..." rows="1" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMsg()">▶</button>
  </div>
</div>

<div id="delete-confirm">

    <button class="delete-btn" onclick="confirmDelete()">削除</button>
    <button class="delete-cancel" onclick="cancelDelete()">キャンセル</button>

</div>

function getSkyColors(){
  var t=skyTime%1;
  // Define key colors at different times
  var stops=[
    {t:0,   top:[40,10,60],  bot:[80,40,100]},   // dawn purple
    {t:0.1, top:[80,40,30],  bot:[200,100,60]},   // sunrise
    {t:0.2, top:[30,60,140], bot:[100,160,220]},   // morning blue
    {t:0.4, top:[20,40,120], bot:[80,140,200]},    // day
    {t:0.6, top:[60,30,20],  bot:[200,80,40]},     // sunset
    {t:0.7, top:[20,10,40],  bot:[60,20,60]},      // dusk
    {t:0.8, top:[5,5,20],    bot:[15,10,30]},      // night
    {t:1.0, top:[40,10,60],  bot:[80,40,100]}      // dawn again
  ];
  // Find surrounding stops
  var a=stops[0],b=stops[1];
  for(var i=0;i<stops.length-1;i++){if(t>=stops[i].t&&t<stops[i+1].t){a=stops[i];b=stops[i+1];break;}}
  var f=(t-a.t)/(b.t-a.t);
  var top=[],bot=[];
  for(var c=0;c<3;c++){top.push(Math.round(a.top[c]+(b.top[c]-a.top[c])*f));bot.push(Math.round(a.bot[c]+(b.bot[c]-a.bot[c])*f));}
  return{top:'rgb('+top.join(',')+')',bot:'rgb('+bot.join(',')+')'};
}

function isNightTime(){var t=skyTime%1;return t>0.7||t<0.05;}

  score=0;lives=3;
  boss.active=false;boss.defeated=false;boss.nextBossDist=1500;boss.warning=false;boss.warningTimer=0;
  for(var i=0;i<6;i++)generateChunk(i*CHUNK_W*TILE_SIZE);
}

function generateChunk(startX){
  var tiles=[];var ce=[];
  var gapC=Math.min(.15,.04+difficulty*.01);
  var enemyC=Math.min(.25,.06+difficulty*.012);
  var coinC=.08;
  for(var col=0;col<CHUNK_W;col++){
    var hasGap=Math.random()<gapC&&col>2&&col<CHUNK_W-2;
    if(hasGap){tiles.push(0);}
    else{
      tiles.push(1);
      if(Math.random()<enemyC&&col>1&&col<CHUNK_W-1){
        var ex=startX+col*TILE_SIZE;
        if(Math.random()<.6)ce.push({type:'slime',x:ex,y:GROUND_Y-8,baseX:ex,frame:0,timer:0,alive:true,dir:1});
        else ce.push({type:'bat',x:ex,y:GROUND_Y-24-Math.random()*16,baseY:GROUND_Y-24-Math.random()*16,frame:0,timer:0,alive:true});
      }
      if(Math.random()<coinC&&col>0){
        coins.push({x:startX+col*TILE_SIZE,y:GROUND_Y-18-Math.random()*12,collected:false,timer:0});
      }
    }
  }
  chunks.push({tiles:tiles,x:startX,enemies:ce});
  for(var i=0;i<ce.length;i++)enemies.push(ce[i]);
}

// ============================================================
// BOSS
// ============================================================
function spawnBoss(){
  boss.active=true;boss.defeated=false;boss.deathTimer=0;
  boss.x=GW+10;boss.y=GROUND_Y-48;
  boss.hp=5+Math.floor(difficulty/2)*2;boss.maxHp=boss.hp;
  boss.phase=0;boss.timer=0;boss.atkTimer=0;boss.hitFlash=0;
  boss.warning=false;boss.warningTimer=0;
  playBossBGM();
}

function updateBoss(dt){
  if(!boss.active)return;
  if(boss.defeated){
    boss.deathTimer+=dt;
    if(boss.deathTimer<1.5){
      if(Math.random()<.3)particles.push({x:boss.x+Math.random()*24,y:boss.y+Math.random()*24,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:.5,color:Math.random()<.5?'#f83800':'#f8b800'});
    }else{
      boss.active=false;boss.nextBossDist=distance+1500+Math.random()*500;
      score+=500;playGameBGM();
    }
    return;
  }
  // Enter screen
  if(boss.x>GW-40)boss.x-=.5;
  boss.timer+=dt;boss.hitFlash=Math.max(0,boss.hitFlash-dt);

  // Float
  boss.y=GROUND_Y-48+Math.sin(boss.timer*1.5)*8;

  // Fire attack
  boss.atkTimer+=dt;
  var atkInterval=Math.max(.8,2-difficulty*.15);
  if(boss.atkTimer>atkInterval&&boss.x<=GW-30){
    boss.atkTimer=0;
    fireballs.push({x:boss.x,y:boss.y+12,vx:-2.5-Math.random(),vy:(Math.random()-.5)*1.5,life:3});
    playNote(150,.15,'sawtooth',.04);
  }

  // Player attack hit
  if(player.attacking&&player.atkFrame===1){
    var ax=player.x+14,ay=player.y+4;
    if(ax>boss.x-4&&ax<boss.x+24&&ay>boss.y-4&&ay<boss.y+24){
      if(boss.hitFlash<=0){
        boss.hp--;boss.hitFlash=.3;sfxBossHit();
        for(var i=0;i<4;i++)particles.push({x:boss.x+12,y:boss.y+12,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:.4,color:'#f83800'});
        if(boss.hp<=0){boss.defeated=true;boss.deathTimer=0;sfxBossDeath();score+=300;}
      }
    }
  }

  // Boss hits player
  if(player.invincible<=0&&!player.dead){
    if(Math.abs(player.x-boss.x)<18&&Math.abs(player.y-boss.y)<20){
      player.invincible=1.5;lives--;sfxHurt();
      if(lives<=0){player.dead=true;player.deadTimer=0;}
    }
  }

  // Fireballs
  for(var i=fireballs.length-1;i>=0;i--){
    var fb=fireballs[i];
    fb.x+=fb.vx;fb.y+=fb.vy;fb.life-=dt;
    if(fb.life<=0||fb.x<-10){fireballs.splice(i,1);continue;}
    // Hit player
    if(player.invincible<=0&&!player.dead&&Math.abs(player.x+8-fb.x)<8&&Math.abs(player.y+8-fb.y)<8){
      player.invincible=1.5;lives--;sfxHurt();fireballs.splice(i,1);
      if(lives<=0){player.dead=true;player.deadTimer=0;}
    }
  }
}

function drawBoss(){
  if(!boss.active)return;
  if(boss.defeated){
    if(Math.floor(boss.deathTimer*8)%2===0)drawSprite(DRAGON_BODY,boss.x,boss.y,1);
    return;
  }
  if(boss.hitFlash>0&&Math.floor(boss.hitFlash*10)%2===0)return;
  drawSprite(DRAGON_BODY,boss.x,boss.y,1);
  // HP bar
  var bw=30,bh=3,bx=boss.x-3,by=boss.y-6;
  ctx.fillStyle='#300000';ctx.fillRect(Math.floor(bx*SCALE),Math.floor(by*SCALE),Math.ceil(bw*SCALE),Math.ceil(bh*SCALE));
  var hw=bw*(boss.hp/boss.maxHp);
  ctx.fillStyle='#f83800';ctx.fillRect(Math.floor(bx*SCALE),Math.floor(by*SCALE),Math.ceil(hw*SCALE),Math.ceil(bh*SCALE));
  // Fireballs
  for(var i=0;i<fireballs.length;i++){var fb=fireballs[i];drawSprite(FIREBALL,fb.x-3,fb.y-3,1);}
}

// ============================================================
// GAME UPDATE
// ============================================================
function updateGame(dt){
  skyTime+=dt*0.008; // full cycle ~125 seconds

  // Shooting stars at night
  if(isNightTime()&&Math.random()<.01)shootingStars.push({x:Math.random()*GW,y:Math.random()*30,vx:-3-Math.random()*2,vy:1+Math.random(),life:.5});
  for(var i=shootingStars.length-1;i>=0;i--){var ss=shootingStars[i];ss.x+=ss.vx;ss.y+=ss.vy;ss.life-=dt;if(ss.life<=0)shootingStars.splice(i,1);}

  if(player.dead){
    player.deadTimer+=dt;
    if(player.deadTimer>1.5){
      lives--;if(lives<=0){STATE='gameover';stopBGM();sfxGameOver();if(score>highScore){highScore=score;localStorage.setItem('dot_highscore',highScore);}return;}
      player.dead=false;player.deadTimer=0;player.y=GROUND_Y-16;player.vy=0;player.onGround=true;player.invincible=2;
    }return;
  }

  // Boss warning
  if(!boss.active&&!boss.warning&&distance>=boss.nextBossDist-200){boss.warning=true;boss.warningTimer=2;sfxBossWarn();}
  if(boss.warning){boss.warningTimer-=dt;if(boss.warningTimer<=0){boss.warning=false;spawnBoss();}}

  // Don't scroll during boss
  if(!boss.active||boss.defeated){
    scrollX+=scrollSpeed;distance+=scrollSpeed;
    scrollSpeed=1.2+distance/5000;difficulty=1+Math.floor(distance/800);
    var last=chunks[chunks.length-1];
    if(last&&scrollX+GW>last.x+CHUNK_W*TILE_SIZE)generateChunk(last.x+CHUNK_W*TILE_SIZE);
    while(chunks.length>0&&chunks[0].x+CHUNK_W*TILE_SIZE<scrollX-40){chunks.shift();for(var i=enemies.length-1;i>=0;i--)if(enemies[i].x<scrollX-40)enemies.splice(i,1);}
  }

  // Player physics
  if(touchL&&player.onGround&&!player.jumping){player.vy=-3.5;player.onGround=false;player.jumping=true;player.jumpTime=0;sfxJump();}
  if(touchL&&player.jumping&&player.jumpTime<.15){player.vy-=.3;player.jumpTime+=dt;}
  if(!touchL)player.jumping=false;
  player.vy+=.18;player.y+=player.vy;

  var ptx=Math.floor((player.x+8+scrollX)/TILE_SIZE);
  var gnd=false;
  for(var ci=0;ci<chunks.length;ci++){var ch=chunks[ci];var lt=ptx-Math.floor(ch.x/TILE_SIZE);if(lt>=0&&lt<CHUNK_W){if(ch.tiles[lt]===1)gnd=true;break;}}
  if(gnd&&player.y>=GROUND_Y-16&&player.vy>=0){player.y=GROUND_Y-16;player.vy=0;player.onGround=true;}
  else if(!gnd&&player.y>=GROUND_Y-16)player.onGround=false;
  if(player.y>GH+10){player.dead=true;player.deadTimer=0;sfxFall();return;}

  // Attack
  if(touchR&&!player.attacking){player.attacking=true;player.atkFrame=0;player.atkTimer=0;sfxAttack();}
  if(player.attacking){player.atkTimer+=dt;if(player.atkTimer>.06){player.atkTimer=0;player.atkFrame++;if(player.atkFrame>=3)player.attacking=false;}}
  player.frameTimer+=dt;if(player.frameTimer>.1){player.frameTimer=0;player.frame=(player.frame+1)%4;}
  if(player.invincible>0)player.invincible-=dt;
  score=Math.max(score,Math.floor(distance/10)*10);

  // Coins
  for(var i=coins.length-1;i>=0;i--){
    var cn=coins[i];if(cn.collected){cn.timer+=dt;if(cn.timer>.3)coins.splice(i,1);continue;}
    var csx=cn.x-scrollX;
    if(Math.abs(player.x+8-csx)<8&&Math.abs(player.y+8-cn.y)<8){cn.collected=true;cn.timer=0;score+=50;sfxCoin();}
    if(csx<-20)coins.splice(i,1);
  }

  // Enemies
  for(var i=0;i<enemies.length;i++){
    var en=enemies[i];if(!en.alive)continue;
    en.timer+=dt;if(en.timer>.2){en.timer=0;en.frame=(en.frame+1)%2;}
    if(en.type==='slime'){en.x+=en.dir*.3;if(Math.abs(en.x-en.baseX)>16)en.dir*=-1;}
    else en.y=en.baseY+Math.sin(gameTime*3+i)*8;
    if(player.attacking&&player.atkFrame===1){var ax=player.x+12,ay=player.y+4,esx=en.x-scrollX;if(Math.abs(ax-esx)<14&&Math.abs(ay-en.y)<14){en.alive=false;score+=100;sfxKill();for(var p=0;p<6;p++)particles.push({x:esx+4,y:en.y+4,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:.4,color:en.type==='slime'?'#58d854':'#8050a0'});}}
    if(player.invincible<=0&&en.alive){var esx2=en.x-scrollX;if(Math.abs(player.x-esx2)<10&&Math.abs(player.y-en.y)<12){player.invincible=1.5;lives--;sfxHurt();if(lives<=0){player.dead=true;player.deadTimer=0;}}}
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=dt;if(p.life<=0)particles.splice(i,1);}

  updateBoss(dt);
}

// ============================================================
// GAME DRAW
// ============================================================
function drawSky(){
  var colors=getSkyColors();
  var grd=ctx.createLinearGradient(0,0,0,Math.floor(GROUND_Y*SCALE));
  grd.addColorStop(0,colors.top);grd.addColorStop(1,colors.bot);
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,Math.ceil(GROUND_Y*SCALE));
  // Below ground
  ctx.fillStyle='#1a0a00';ctx.fillRect(0,Math.floor(GROUND_Y*SCALE),W,H-Math.floor(GROUND_Y*SCALE));
}

function drawStarsAndMoon(){
  var night=isNightTime();var t=skyTime%1;
  var alpha=0;
  if(t>.65&&t<.8)alpha=(t-.65)/.15;
  else if(t>=.8||t<.05)alpha=1;
  else if(t>=.05&&t<.15)alpha=1-(t-.05)/.1;
  if(alpha<=0)return;

  // Stars
  for(var i=0;i<bgStars.length;i++){
    var s=bgStars[i];var b=(.3+Math.sin(gameTime*2+s.b*10)*.3)*alpha;
    ctx.fillStyle='rgba(255,255,255,'+b+')';
    ctx.fillRect(Math.floor(s.x/200*W),Math.floor(s.y/80*GROUND_Y*SCALE/GH*1.2),Math.ceil(s.s*SCALE),Math.ceil(s.s*SCALE));
  }

  // Moon
  if(alpha>.3){
    var mx=GW*.75,my=15;
    ctx.fillStyle='rgba(255,255,200,'+(alpha*.15)+')';
    ctx.beginPath();ctx.arc(mx*SCALE,my*SCALE,12*SCALE,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,220,'+(alpha*.6)+')';
    ctx.beginPath();ctx.arc(mx*SCALE,my*SCALE,5*SCALE,0,Math.PI*2);ctx.fill();
  }

  // Shooting stars
  for(var i=0;i<shootingStars.length;i++){
    var ss=shootingStars[i];
    ctx.strokeStyle='rgba(255,255,255,'+(ss.life*2)+')';ctx.lineWidth=SCALE;
    ctx.beginPath();ctx.moveTo(ss.x*SCALE,ss.y*SCALE);ctx.lineTo((ss.x-ss.vx*3)*SCALE,(ss.y-ss.vy*3)*SCALE);ctx.stroke();
  }
}

function drawBackground(){
  // Mountains
  var t=skyTime%1;var mAlpha=(t>.7||t<.1)?0.15:0.3;
  for(var i=0;i<bgMountains.length;i++){
    var mt=bgMountains[i];var mx=((mt.x-scrollX*.05)%250+250)%250-25;
    ctx.fillStyle='rgba(40,30,60,'+mAlpha+')';
    ctx.beginPath();ctx.moveTo(Math.floor(mx*SCALE),Math.floor(GROUND_Y*SCALE));
    ctx.lineTo(Math.floor((mx+mt.w/2)*SCALE),Math.floor((GROUND_Y-mt.h)*SCALE));
    ctx.lineTo(Math.floor((mx+mt.w)*SCALE),Math.floor(GROUND_Y*SCALE));ctx.fill();
    // Snow cap
    ctx.fillStyle='rgba(200,200,220,'+mAlpha*.5+')';
    ctx.beginPath();ctx.moveTo(Math.floor((mx+mt.w/2)*SCALE),Math.floor((GROUND_Y-mt.h)*SCALE));
    ctx.lineTo(Math.floor((mx+mt.w/2-2)*SCALE),Math.floor((GROUND_Y-mt.h+3)*SCALE));
    ctx.lineTo(Math.floor((mx+mt.w/2+2)*SCALE),Math.floor((GROUND_Y-mt.h+3)*SCALE));ctx.fill();
  }

  // Clouds
  for(var i=0;i<bgClouds.length;i++){
    var cl=bgClouds[i];var cx=((cl.x-scrollX*.08+gameTime*2)%230+230)%230-15;
    var cAlpha=isNightTime()?.05:.12;
    ctx.fillStyle='rgba(255,255,255,'+cAlpha+')';
    ctx.fillRect(Math.floor(cx*SCALE),Math.floor(cl.y*SCALE),Math.floor(cl.w*SCALE),Math.floor(cl.h*SCALE));
    ctx.fillRect(Math.floor((cx+2)*SCALE),Math.floor((cl.y-1.5)*SCALE),Math.floor((cl.w-4)*SCALE),Math.floor(1.5*SCALE));
  }

  // Trees
  for(var i=0;i<bgTrees.length;i++){
    var tr=bgTrees[i];var tx=((tr.x-scrollX*.15)%230+230)%230-10;var ty=GROUND_Y;
    ctx.fillStyle='#201008';
    ctx.fillRect(Math.floor((tx+2)*SCALE),Math.floor((ty-tr.h*.4)*SCALE),Math.ceil(2*SCALE),Math.ceil(tr.h*.4*SCALE));
    ctx.fillStyle=isNightTime()?'#081808':'#184020';
    ctx.fillRect(Math.floor(tx*SCALE),Math.floor((ty-tr.h)*SCALE),Math.ceil(6*SCALE),Math.ceil(tr.h*.7*SCALE));
  }
}

function drawGame(){
  drawSky();drawStarsAndMoon();drawBackground();

  // Ground tiles
  for(var ci=0;ci<chunks.length;ci++){
    var ch=chunks[ci];
    for(var col=0;col<CHUNK_W;col++){
      if(ch.tiles[col]===1){
        var tx=ch.x+col*TILE_SIZE-scrollX;
        if(tx>-TILE_SIZE&&tx<GW+TILE_SIZE){drawSprite(TILE_GRASS,tx,GROUND_Y,1);drawSprite(TILE_DIRT,tx,GROUND_Y+TILE_SIZE,1);drawSprite(TILE_DIRT,tx,GROUND_Y+TILE_SIZE*2,1);}
      }
    }
  }

  // Coins
  for(var i=0;i<coins.length;i++){
    var cn=coins[i];if(cn.collected)continue;
    var cx=cn.x-scrollX;if(cx>-10&&cx<GW+10){
      var bobY=cn.y+Math.sin(gameTime*4+cn.x)*.5;
      drawSprite(COIN_SPRITE,cx,bobY,1);
    }
  }

  // Enemies
  for(var i=0;i<enemies.length;i++){var en=enemies[i];if(!en.alive)continue;var esx=en.x-scrollX;if(esx>-10&&esx<GW+10){if(en.type==='slime')drawSprite(SLIME[en.frame],esx,en.y,1);else drawSprite(BAT[en.frame],esx,en.y,1);}}

  // Particles
  for(var i=0;i<particles.length;i++){var p=particles[i];ctx.fillStyle=p.color;ctx.fillRect(Math.floor(p.x*SCALE),Math.floor(p.y*SCALE),Math.ceil(2*SCALE),Math.ceil(2*SCALE));}

  // Boss
  drawBoss();

  // Player
  if(!player.dead){
    var vis=player.invincible<=0||Math.floor(player.invincible*10)%2===0;
    if(vis){var sp;if(player.attacking)sp=KNIGHT_ATK[Math.min(player.atkFrame,2)];else if(!player.onGround)sp=KNIGHT_JUMP;else sp=KNIGHT_RUN[player.frame];drawSprite(sp,player.x,player.y,1);}
  }else drawSprite(KNIGHT_DEAD,player.x,player.y+4,1);

  // HUD
  drawPixelText('SCORE '+padNum(score,6),2,3,'#f8b800',1);
  for(var i=0;i<3;i++)drawSprite(i<lives?HEART:HEART_EMPTY,GW-28+i*9,2,1);
  // Pause btn
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillRect(Math.floor((GW-10)*SCALE),Math.floor(12*SCALE),Math.ceil(3*SCALE),Math.ceil(7*SCALE));
  ctx.fillRect(Math.floor((GW-5)*SCALE),Math.floor(12*SCALE),Math.ceil(3*SCALE),Math.ceil(7*SCALE));

  // Stage indicator
  var stg=Math.floor(distance/1500)+1;
  drawPixelText('STAGE '+stg,2,12,'#6888fc',1);

  // Boss warning
  if(boss.warning&&Math.floor(gameTime*4)%2===0){
    drawPixelTextCentered('WARNING!!',GH*.35,'#f83800',2);
    drawPixelTextCentered('BOSS APPROACHING',GH*.35+16,'#f8b800',1);
  }
}

function drawTitle(){
  skyTime+=.001;drawSky();drawStarsAndMoon();

  // Ground
  for(var i=0;i<Math.ceil(GW/8)+1;i++){drawSprite(TILE_GRASS,i*8,GH*.6,1);drawSprite(TILE_DIRT,i*8,GH*.6+8,1);}

  // Slime decoration

  if(Math.floor(gameTime*2)%2===0)drawPixelTextCentered('TAP TO START',GH*.78,'#fcfcfc',1.5);

}

// ============================================================
// PAUSE
// ============================================================
function drawPause(){
  drawGame();
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);

  var fx=GW*.1,fy=GH*.12,fw=GW*.8,fh=GH*.65;
  ctx.fillStyle='#0a0620';ctx.fillRect(Math.floor(fx*SCALE),Math.floor(fy*SCALE),Math.floor(fw*SCALE),Math.floor(fh*SCALE));
  ctx.strokeStyle='#f8b800';ctx.lineWidth=Math.ceil(SCALE*.8);
  ctx.strokeRect(Math.floor(fx*SCALE),Math.floor(fy*SCALE),Math.floor(fw*SCALE),Math.floor(fh*SCALE));
  ctx.strokeRect(Math.floor((fx+2)*SCALE),Math.floor((fy+2)*SCALE),Math.floor((fw-4)*SCALE),Math.floor((fh-4)*SCALE));

  drawPixelTextCentered('PAUSED',fy+10,'#f8b800',2);
  var items=['RESUME','RESTART','SOUND '+(soundEnabled?'ON':'OFF')];
  for(var i=0;i<items.length;i++){
    var iy=fy+35+i*16;var col=pauseSelection===i?'#fca044':'#a8a8a8';
    drawPixelTextCentered(items[i],iy,col,1.2);
    if(pauseSelection===i)drawPixelText('>',GW*.2,iy,'#fca044',1.2);
  }
  drawPixelTextCentered('SCORE '+padNum(score,6),fy+fh-15,'#6888fc',1);

  if(showKeypad)drawKeypad();
}

function drawKeypad(){
  var kw=60,kh=56,kx=(GW-kw)/2,ky=GH*.5-kh/2;
  ctx.fillStyle='rgba(10,6,32,0.95)';ctx.fillRect(Math.floor(kx*SCALE),Math.floor(ky*SCALE),Math.floor(kw*SCALE),Math.floor(kh*SCALE));
  ctx.strokeStyle='#5a5aff';ctx.lineWidth=Math.ceil(SCALE*.6);
  ctx.strokeRect(Math.floor(kx*SCALE),Math.floor(ky*SCALE),Math.floor(kw*SCALE),Math.floor(kh*SCALE));
  for(var d=0;d<4;d++){var dx=kx+12+d*10,dy=ky+4;if(d<keypadInput.length){ctx.fillStyle='#f8b800';ctx.fillRect(Math.floor((dx+1)*SCALE),Math.floor((dy+1)*SCALE),Math.ceil(4*SCALE),Math.ceil(4*SCALE));}else{ctx.strokeStyle='#5a5a8a';ctx.strokeRect(Math.floor((dx+1)*SCALE),Math.floor((dy+1)*SCALE),Math.ceil(4*SCALE),Math.ceil(4*SCALE));}}
  var nums=['1','2','3','4','5','6','7','8','9','','0',''];

}

// ============================================================
// GAME OVER
// ============================================================
function drawGameOver(){
  drawGame();ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  drawPixelTextCentered('GAME OVER',GH*.3,'#f83800',2.5);
  drawPixelTextCentered('SCORE '+padNum(score,6),GH*.45,'#f8b800',1.5);
  drawPixelTextCentered('BEST  '+padNum(highScore,6),GH*.52,'#6888fc',1);
  if(Math.floor(gameTime*2)%2===0)drawPixelTextCentered('TAP TO RETRY',GH*.7,'#fcfcfc',1.2);
}

// ============================================================
// TOUCH
// ============================================================
canvas.addEventListener('touchstart',function(e){e.preventDefault();initAudio();for(var i=0;i<e.changedTouches.length;i++)handleTouchDown(e.changedTouches[i].clientX,e.changedTouches[i].clientY);},{passive:false});
canvas.addEventListener('touchend',function(e){e.preventDefault();for(var i=0;i<e.changedTouches.length;i++)handleTouchUp(e.changedTouches[i].clientX,e.changedTouches[i].clientY);if(e.touches.length===0){touchL=false;touchR=false;}},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
canvas.addEventListener('mousedown',function(e){initAudio();handleTouchDown(e.clientX,e.clientY);});
canvas.addEventListener('mouseup',function(e){handleTouchUp(e.clientX,e.clientY);touchL=false;touchR=false;});

function handleTouchDown(cx,cy){
  resetInactivity();
  if(STATE==='title'){STATE='playing';initLevel();playGameBGM();return;}
  if(STATE==='gameover'){STATE='title';playTitleBGM();return;}
  if(STATE==='playing'){
    if(cx/W>.82&&cy/H<.1){STATE='paused';pauseSelection=0;pauseScoreTaps=0;showKeypad=false;keypadInput='';sfxPause();stopBGM();return;}
    if(cx<W/2)touchL=true;else touchR=true;return;
  }
  if(STATE==='paused'){handlePauseTap(cx,cy);return;}
}
function handleTouchUp(cx,cy){if(cx<W/2)touchL=false;else touchR=false;}

function handlePauseTap(cx,cy){
  var gx=cx/SCALE,gy=cy/SCALE;
  if(showKeypad){handleKeypadTap(gx,gy);return;}
  var fx=GW*.1,fy=GH*.12,fw=GW*.8,fh=GH*.65;
  var scoreY=fy+fh-15;
  if(gy>scoreY-4&&gy<scoreY+10){pauseScoreTaps++;clearTimeout(pauseScoreTapTimer);pauseScoreTapTimer=setTimeout(function(){pauseScoreTaps=0;},2000);if(pauseScoreTaps>=5){showKeypad=true;keypadInput='';pauseScoreTaps=0;}return;}
  for(var i=0;i<3;i++){var iy=fy+35+i*16;if(gy>iy-4&&gy<iy+10&&gx>GW*.15&&gx<GW*.85){if(i===0){STATE='playing';if(boss.active&&!boss.defeated)playBossBGM();else playGameBGM();}else if(i===1){STATE='playing';initLevel();playGameBGM();}else{soundEnabled=!soundEnabled;localStorage.setItem('dot_sound',soundEnabled?'on':'off');}return;}}
}

function handleKeypadTap(gx,gy){
  var kw=60,kh=56,kx=(GW-kw)/2,ky=GH*.5-kh/2;
  var nums=['1','2','3','4','5','6','7','8','9','','0',''];
  for(var bi=0;bi<12;bi++){if(!nums[bi])continue;var bx=kx+4+(bi%3)*18,by=ky+12+Math.floor(bi/3)*11;
    if(gx>=bx&&gx<=bx+16&&gy>=by&&gy<=by+9){sfxKeypad();keypadInput+=nums[bi];
      if(keypadInput.length>=4){if(keypadInput==='1989'){sfxWarp();showKeypad=false;setTimeout(openChat,500);}else setTimeout(function(){showKeypad=false;keypadInput='';},300);}return;}}
  if(gx<kx||gx>kx+kw||gy<ky||gy>ky+kh){showKeypad=false;keypadInput='';}
}

// ============================================================
// MAIN LOOP
// ============================================================
var lastTime=0,running=true;
function gameLoop(time){if(!running)return;var dt=Math.min((time-lastTime)/1000,.05);lastTime=time;gameTime+=dt;
  if(STATE==='playing'){updateGame(dt);drawGame();}
  else if(STATE==='title')drawTitle();
  else if(STATE==='paused')drawPause();
  else if(STATE==='gameover')drawGameOver();
  requestAnimationFrame(gameLoop);}
function startGameLoop(){running=true;lastTime=performance.now();requestAnimationFrame(gameLoop);}
function stopGameLoop(){running=false;}

// ============================================================
// CHAT (uses messages_game table)
// ============================================================
var userId=localStorage.getItem('game_user_id')||null;
var realtimeChannel=null,pollInterval=null,lastPollTime=new Date(),selectedMsgId=null,inactivityTimer=null;

function sbFetch(path,opt){if(!opt)opt={};if(!opt.headers)opt.headers={};opt.headers['apikey']=SUPABASE_KEY;opt.headers['Authorization']='Bearer '+SUPABASE_KEY;opt.headers['Content-Type']='application/json';if(!opt.headers['Prefer'])opt.headers['Prefer']='return=representation';return fetch(SUPABASE_URL+'/rest/v1/'+path,opt).then(function(r){if(!r.ok)throw new Error('err');return r.text().then(function(t){return t?JSON.parse(t):null;});});}

function openChat(){
  if(!userId){userId=localStorage.getItem('game_user_id')||('user_'+Date.now());localStorage.setItem('game_user_id',userId);}
  var pn=localStorage.getItem('game_partner_name'),mn=localStorage.getItem('game_my_name');
  if(!pn){pn=prompt('相手の名前を入力してください','');if(!pn||!pn.trim())pn='相手';pn=pn.trim();localStorage.setItem('game_partner_name',pn);}
  if(!mn){mn=prompt('自分の名前を入力してください','');if(!mn||!mn.trim())mn='自分';mn=mn.trim();localStorage.setItem('game_my_name',mn);}
  document.getElementById('chat-partner-name').textContent=pn;
  document.getElementById('chat-my-name').textContent='自分：'+mn;
  document.getElementById('chat-avatar').textContent=pn.charAt(0);
  STATE='chat';stopBGM();stopGameLoop();canvas.style.display='none';
  document.getElementById('chat-screen').classList.add('show');
  loadMessages();localStorage.setItem('game_last_read',new Date().toISOString());
  connectRealtime();setTimeout(scrollToBottom,100);
}

function exitChat(){
  disconnectRealtime();document.getElementById('chat-screen').classList.remove('show');
  canvas.style.display='block';STATE='paused';showKeypad=false;keypadInput='';startGameLoop();
}

function editName(w){var el,key,pre;if(w==='partner'){el=document.getElementById('chat-partner-name');key='game_partner_name';pre='';}else{el=document.getElementById('chat-my-name');key='game_my_name';pre='自分：';}var cur=el.textContent.replace('自分：','');var nn=prompt('名前を入力',cur);if(nn!==null&&nn.trim()!==''){nn=nn.trim();localStorage.setItem(key,nn);if(w==='partner'){el.textContent=nn;document.getElementById('chat-avatar').textContent=nn.charAt(0);}else el.textContent=pre+nn;}}

function swapIdentity(){sbFetch(DB_TABLE+'?select=user_id&order=created_at.desc&limit=50').then(function(msgs){if(!msgs)return;var oids=[];for(var i=0;i<msgs.length;i++)if(msgs[i].user_id!==userId&&oids.indexOf(msgs[i].user_id)===-1)oids.push(msgs[i].user_id);if(oids.length>0){userId=oids[0];localStorage.setItem('game_user_id',userId);var pn=localStorage.getItem('game_partner_name')||'相手',mn=localStorage.getItem('game_my_name')||'自分';localStorage.setItem('game_partner_name',mn);localStorage.setItem('game_my_name',pn);document.getElementById('chat-partner-name').textContent=mn;document.getElementById('chat-my-name').textContent='自分：'+pn;document.getElementById('chat-avatar').textContent=mn.charAt(0);loadMessages();}}).catch(function(){});}

function appendMessage(msg,anim){
  var c=document.getElementById('chat-messages'),mine=msg.user_id===userId,pn=localStorage.getItem('game_partner_name')||'相手';
  var row=document.createElement('div');row.className='msg-row '+(mine?'mine':'theirs');
  var bub=document.createElement('div');bub.className='msg-bubble';bub.setAttribute('data-id',msg.id);bub.innerHTML=escHtml(msg.content);if(anim===false)bub.style.animation='none';addPressEvents(bub,msg.id);
  var wrap=document.createElement('div');wrap.className='msg-wrap';wrap.appendChild(bub);
  if(!mine){var av=document.createElement('div');av.className='msg-avatar-sm';av.textContent=pn.charAt(0);row.appendChild(av);}
  row.appendChild(wrap);c.appendChild(row);scrollToBottom();
}

function loadMessages(){var c=document.getElementById('chat-messages');c.innerHTML='<div class="loading-msg">読み込み中...</div>';lastPollTime=new Date(Date.now()-86400000);sbFetch(DB_TABLE+'?select=*&order=created_at.asc&limit=200').then(function(msgs){c.innerHTML='';if(msgs&&msgs.length>0){for(var i=0;i<msgs.length;i++)appendMessage(msgs[i],false);lastPollTime=new Date();}else c.innerHTML='<div class="loading-msg">まだメッセージはありません</div>';}).catch(function(){c.innerHTML='<div class="loading-msg">読み込みエラー</div>';});}

function sendMsg(){var inp=document.getElementById('chat-input'),txt=inp.value.trim();if(!txt)return;inp.value='';inp.style.height='';sbFetch(DB_TABLE,{method:'POST',body:JSON.stringify({user_id:userId,content:txt})}).then(function(r){if(r&&r[0]){var lm=document.querySelector('#chat-messages .loading-msg');if(lm)lm.remove();appendMessage(r[0],true);lastPollTime=new Date();localStorage.setItem('game_last_read',new Date().toISOString());}}).catch(function(){});}

function connectRealtime(){disconnectRealtime();lastPollTime=new Date();try{var ws=new WebSocket(SUPABASE_URL.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+SUPABASE_KEY+'&vsn=1.0.0');realtimeChannel=ws;var conn=false;ws.onopen=function(){conn=true;ws.send(JSON.stringify({topic:'realtime:public:'+DB_TABLE,event:'phx_join',payload:{config:{broadcast:{self:true},postgres_changes:[{event:'INSERT',schema:'public',table:DB_TABLE},{event:'DELETE',schema:'public',table:DB_TABLE}]}},ref:'1'}));};ws.onmessage=function(e){try{var d=JSON.parse(e.data);if(d.event==='postgres_changes'&&d.payload){var t=d.payload.type,rec=d.payload.record,old=d.payload.old_record;if(t==='DELETE'&&old){var els=document.querySelectorAll('[data-id="'+old.id+'"]');for(var i=0;i<els.length;i++){var row=els[i].closest('.msg-row');if(row)row.remove();}}else if(t==='INSERT'&&rec&&rec.user_id!==userId){var lm=document.querySelector('#chat-messages .loading-msg');if(lm)lm.remove();appendMessage(rec,true);lastPollTime=new Date();localStorage.setItem('game_last_read',new Date().toISOString());}}}catch(er){}};ws.onerror=function(){conn=false;startPolling();};ws.onclose=function(){if(!conn)startPolling();};}catch(e){startPolling();}}

function startPolling(){if(pollInterval)clearInterval(pollInterval);pollInterval=setInterval(function(){if(!userId)return;sbFetch(DB_TABLE+'?select=*&order=created_at.asc&created_at=gt.'+encodeURIComponent(lastPollTime.toISOString())).then(function(msgs){if(msgs&&msgs.length>0){var lm=document.querySelector('#chat-messages .loading-msg');if(lm)lm.remove();for(var i=0;i<msgs.length;i++)if(msgs[i].user_id!==userId)appendMessage(msgs[i],true);lastPollTime=new Date();localStorage.setItem('game_last_read',new Date().toISOString());}}).catch(function(){});},3000);}
function disconnectRealtime(){if(realtimeChannel){try{realtimeChannel.close();}catch(e){}realtimeChannel=null;}if(pollInterval){clearInterval(pollInterval);pollInterval=null;}}

function addPressEvents(bub,id){var timer=null,moved=false;bub.addEventListener('touchstart',function(){moved=false;timer=setTimeout(function(){if(!moved){selectedMsgId=id;bub.classList.add('held');document.getElementById('delete-confirm').classList.add('show');}},600);},{passive:true});bub.addEventListener('touchmove',function(){moved=true;clearTimeout(timer);},{passive:true});bub.addEventListener('touchend',function(){clearTimeout(timer);if(!selectedMsgId)bub.classList.remove('held');},{passive:true});}
function confirmDelete(){if(!selectedMsgId)return;document.getElementById('delete-confirm').classList.remove('show');var held=document.querySelectorAll('.msg-bubble.held');for(var i=0;i<held.length;i++)held[i].classList.remove('held');sbFetch(DB_TABLE+'?id=eq.'+selectedMsgId,{method:'DELETE',headers:{'Prefer':'return=minimal'}}).then(function(){var els=document.querySelectorAll('[data-id="'+selectedMsgId+'"]');for(var i=0;i<els.length;i++){var row=els[i].closest('.msg-row');if(row)row.remove();}selectedMsgId=null;}).catch(function(){});}
function cancelDelete(){document.getElementById('delete-confirm').classList.remove('show');var held=document.querySelectorAll('.msg-bubble.held');for(var i=0;i<held.length;i++)held[i].classList.remove('held');selectedMsgId=null;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function scrollToBottom(){document.getElementById('chat-messages').scrollTop=9999999;}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
document.getElementById('chat-input').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});

function resetInactivity(){clearTimeout(inactivityTimer);inactivityTimer=setTimeout(function(){if(STATE==='chat')exitChat();},180000);}
document.addEventListener('touchstart',resetInactivity,{passive:true});
document.addEventListener('click',resetInactivity);

// ============================================================
// INIT
// ============================================================
soundEnabled=localStorage.getItem('dot_sound')!=='off';
STATE='title';startGameLoop();
</script>
</body>
</html>
