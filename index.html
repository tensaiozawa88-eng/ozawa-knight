function hPa(cx2,cy){var gx=cx2/SC,gy=(cy-GT)/SC;if(shKP){hKP(gx,gy);return;}var fx=GW*.1,fy=GHt*.12,fw=GW*.8,fh=GHt*.65;var sY=fy+fh-15;if(gy>sY-4&&gy<sY+10){pST++;clearTimeout(pSTm);pSTm=setTimeout(function(){pST=0;},2000);if(pST>=5){shKP=true;kpI='';pST=0;}return;}for(var i=0;i<3;i++){var iy=fy+35+i*16;if(gy>iy-4&&gy<iy+10&&gx>GW*.15&&gx<GW*.85){if(i===0){ST='playing';if(boss.a&&!boss.df)pBB();else pGB();}else if(i===1){ST='playing';iLv();pGB();}else{snd=!snd;localStorage.setItem('dot_sound',snd?'on':'off');}return;}}}
function hKP(gx,gy){var kw=60,kh=56,kx=(GW-kw)/2,ky=GHt*.5-kh/2;var nums=['1','2','3','4','5','6','7','8','9','','0',''];for(var bi=0;bi<12;bi++){if(!nums[bi])continue;var bx=kx+4+(bi%3)*18,by=ky+12+Math.floor(bi/3)*11;if(gx>=bx&&gx<=bx+16&&gy>=by&&gy<=by+9){sKP();kpI+=nums[bi];if(kpI.length>=4){if(kpI==='1989'){sW();shKP=false;setTimeout(openChat,500);}else setTimeout(function(){shKP=false;kpI='';},300);}return;}}if(gx<kx||gx>kx+kw||gy<ky||gy>ky+kh){shKP=false;kpI='';}}

// LOOP
var lTm=0,run=true;
function loop(t){if(!run)return;var dt=Math.min((t-lTm)/1000,.05);lTm=t;gt+=dt;if(ST==='playing'){uG(dt);dG();}else if(ST==='title')dTi();else if(ST==='paused')dPa();else if(ST==='gameover')dGO();requestAnimationFrame(loop);}
function stL(){run=true;lTm=performance.now();requestAnimationFrame(loop);}
function spL(){run=false;}

// CHAT
var uId=localStorage.getItem('game_user_id')||null,rtCh=null,plI=null,lPT=new Date(),selI=null,inT=null;
function sbF(p,o){if(!o)o={};if(!o.headers)o.headers={};o.headers['apikey']=SK;o.headers['Authorization']='Bearer '+SK;o.headers['Content-Type']='application/json';if(!o.headers['Prefer'])o.headers['Prefer']='return=representation';return fetch(SU+'/rest/v1/'+p,o).then(function(r){if(!r.ok)throw new Error('e');return r.text().then(function(t){return t?JSON.parse(t):null;});});}
function openChat(){if(!uId){uId=localStorage.getItem('game_user_id')||('user_'+Date.now());localStorage.setItem('game_user_id',uId);}var pn=localStorage.getItem('game_partner_name'),mn=localStorage.getItem('game_my_name');if(!pn){pn=prompt('相手の名前を入力してください','');if(!pn||!pn.trim())pn='相手';pn=pn.trim();localStorage.setItem('game_partner_name',pn);}if(!mn){mn=prompt('自分の名前を入力してください','');if(!mn||!mn.trim())mn='自分';mn=mn.trim();localStorage.setItem('game_my_name',mn);}document.getElementById('cpn').textContent=pn;document.getElementById('cmn').textContent='自分：'+mn;document.getElementById('cav').textContent=pn.charAt(0);ST='chat';stBGM();spL();cv.style.display='none';document.getElementById('cs').classList.add('show');ldM();localStorage.setItem('game_last_read',new Date().toISOString());cRT();setTimeout(scB,100);}
function exitChat(){dRT();document.getElementById('cs').classList.remove('show');cv.style.display='block';ST='paused';shKP=false;kpI='';stL();}
function editName(w){var el,k,pr;if(w==='partner'){el=document.getElementById('cpn');k='game_partner_name';pr='';}else{el=document.getElementById('cmn');k='game_my_name';pr='自分：';}var c=el.textContent.replace('自分：','');var n=prompt('名前を入力',c);if(n!==null&&n.trim()!==''){n=n.trim();localStorage.setItem(k,n);if(w==='partner'){el.textContent=n;document.getElementById('cav').textContent=n.charAt(0);}else el.textContent=pr+n;}}
function swapId(){sbF(DT+'?select=user_id&order=created_at.desc&limit=50').then(function(m){if(!m)return;var o=[];for(var i=0;i<m.length;i++)if(m[i].user_id!==uId&&o.indexOf(m[i].user_id)===-1)o.push(m[i].user_id);if(o.length>0){uId=o[0];localStorage.setItem('game_user_id',uId);var pn=localStorage.getItem('game_partner_name')||'相手',mn=localStorage.getItem('game_my_name')||'自分';localStorage.setItem('game_partner_name',mn);localStorage.setItem('game_my_name',pn);document.getElementById('cpn').textContent=mn;document.getElementById('cmn').textContent='自分：'+pn;document.getElementById('cav').textContent=mn.charAt(0);ldM();}}).catch(function(){});}
function aM(m,a){var c=document.getElementById('cms'),mine=m.user_id===uId,pn=localStorage.getItem('game_partner_name')||'相手';var row=document.createElement('div');row.className='mr '+(mine?'mine':'theirs');var bub=document.createElement('div');bub.className='mb';bub.setAttribute('data-id',m.id);bub.innerHTML=eH(m.content);if(a===false)bub.style.animation='none';aPE(bub,m.id);var wrap=document.createElement('div');wrap.className='mw';wrap.appendChild(bub);if(!mine){var av=document.createElement('div');av.className='ma';av.textContent=pn.charAt(0);row.appendChild(av);}row.appendChild(wrap);c.appendChild(row);scB();}
function ldM(){var c=document.getElementById('cms');c.innerHTML='<div class="lm">読み込み中...</div>';lPT=new Date(Date.now()-86400000);sbF(DT+'?select=*&order=created_at.asc&limit=200').then(function(m){c.innerHTML='';if(m&&m.length>0){for(var i=0;i<m.length;i++)aM(m[i],false);lPT=new Date();}else c.innerHTML='<div class="lm">まだメッセージはありません</div>';}).catch(function(){c.innerHTML='<div class="lm">読み込みエラー</div>';});}
function sendM(){var inp=document.getElementById('cin'),t=inp.value.trim();if(!t)return;inp.value='';inp.style.height='';sbF(DT,{method:'POST',body:JSON.stringify({user_id:uId,content:t})}).then(function(r){if(r&&r[0]){var lm=document.querySelector('#cms .lm');if(lm)lm.remove();aM(r[0],true);lPT=new Date();localStorage.setItem('game_last_read',new Date().toISOString());}}).catch(function(){});}
function cRT(){dRT();lPT=new Date();try{var ws=new WebSocket(SU.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+SK+'&vsn=1.0.0');rtCh=ws;var cn=false;ws.onopen=function(){cn=true;ws.send(JSON.stringify({topic:'realtime:public:'+DT,event:'phx_join',payload:{config:{broadcast:{self:true},postgres_changes:[{event:'INSERT',schema:'public',table:DT},{event:'DELETE',schema:'public',table:DT}]}},ref:'1'}));};ws.onmessage=function(e){try{var d=JSON.parse(e.data);if(d.event==='postgres_changes'&&d.payload){var tp=d.payload.type,rec=d.payload.record,old=d.payload.old_record;if(tp==='DELETE'&&old){var els=document.querySelectorAll('[data-id="'+old.id+'"]');for(var i=0;i<els.length;i++){var row=els[i].closest('.mr');if(row)row.remove();}}else if(tp==='INSERT'&&rec&&rec.user_id!==uId){var lm=document.querySelector('#cms .lm');if(lm)lm.remove();aM(rec,true);lPT=new Date();localStorage.setItem('game_last_read',new Date().toISOString());}}}catch(er){}};ws.onerror=function(){cn=false;sPl();};ws.onclose=function(){if(!cn)sPl();};}catch(e){sPl();}}
function sPl(){if(plI)clearInterval(plI);plI=setInterval(function(){if(!uId)return;sbF(DT+'?select=*&order=created_at.asc&created_at=gt.'+encodeURIComponent(lPT.toISOString())).then(function(m){if(m&&m.length>0){var lm=document.querySelector('#cms .lm');if(lm)lm.remove();for(var i=0;i<m.length;i++)if(m[i].user_id!==uId)aM(m[i],true);lPT=new Date();localStorage.setItem('game_last_read',new Date().toISOString());}}).catch(function(){});},3000);}
function dRT(){if(rtCh){try{rtCh.close();}catch(e){}rtCh=null;}if(plI){clearInterval(plI);plI=null;}}
function aPE(b,id){var tm=null,mv=false;b.addEventListener('touchstart',function(){mv=false;tm=setTimeout(function(){if(!mv){selI=id;b.classList.add('held');document.getElementById('dc').classList.add('show');}},600);},{passive:true});b.addEventListener('touchmove',function(){mv=true;clearTimeout(tm);},{passive:true});b.addEventListener('touchend',function(){clearTimeout(tm);if(!selI)b.classList.remove('held');},{passive:true});}
function cfmDel(){if(!selI)return;document.getElementById('dc').classList.remove('show');var h=document.querySelectorAll('.mb.held');for(var i=0;i<h.length;i++)h[i].classList.remove('held');sbF(DT+'?id=eq.'+selI,{method:'DELETE',headers:{'Prefer':'return=minimal'}}).then(function(){var e=document.querySelectorAll('[data-id="'+selI+'"]');for(var i=0;i<e.length;i++){var r=e[i].closest('.mr');if(r)r.remove();}selI=null;}).catch(function(){});}
function cnlDel(){document.getElementById('dc').classList.remove('show');var h=document.querySelectorAll('.mb.held');for(var i=0;i<h.length;i++)h[i].classList.remove('held');selI=null;}
function eH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function scB(){document.getElementById('cms').scrollTop=9999999;}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
document.getElementById('cin').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendM();}});
function rIn(){clearTimeout(inT);inT=setTimeout(function(){if(ST==='chat')exitChat();},180000);}
document.addEventListener('touchstart',rIn,{passive:true});document.addEventListener('click',rIn);

snd=localStorage.getItem('dot_sound')!=='off';ST='title';stL();

</script>
